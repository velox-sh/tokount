name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  crates-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
