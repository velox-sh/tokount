name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package binary
        run: |
          tar -czvf tokount-linux-x86_64.tar.gz -C target/release tokount
          sha256sum tokount-linux-x86_64.tar.gz > tokount-linux-x86_64.tar.gz.sha256

      - name: Extract release notes from changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          bash .github/workflows/scripts/extract-changelog.sh "$VERSION" > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
          files: |
            tokount-linux-x86_64.tar.gz
            tokount-linux-x86_64.tar.gz.sha256
