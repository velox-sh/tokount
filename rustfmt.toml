edition = "2024"

max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"

# import handling (closest to isort)
reorder_imports = true
reorder_modules = true
imports_granularity = "Item"
group_imports = "StdExternalCrate"

# trailing commas similar to ruff default
trailing_comma = "Vertical"

# formatting behavior
use_small_heuristics = "Default"
format_code_in_doc_comments = true
wrap_comments = true
comment_width = 80